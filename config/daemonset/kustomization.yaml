# kustomization.yaml — DaemonSet base
#
# Deploys k8ops as a DaemonSet (one pod per node) instead of a single Deployment.
# Useful for per-node diagnostics and host-level management.
#
# Usage:
#   kubectl apply -k config/daemonset/
#
# Prerequisites: namespace, serviceaccount, RBAC roles must already exist.
# Apply the base layer first if this is a fresh cluster:
#   kubectl apply -k config/deploy/base/
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: k8ops-daemonset
  namespace: k8ops-system

resources:
- daemonset.yaml

configMapGenerator:
- name: k8ops-config
  literals:
  - PROVIDER_TYPE=openai
  - PROVIDER_MODEL=gpt-4o
  - PROVIDER_ENDPOINT=https://api.openai.com/v1
  - cors-allowed-origins=
  - provider-rate-limit-rpm=0
  - debug=false

# Shared labels
commonLabels:
  app.kubernetes.io/name: k8ops
  app.kubernetes.io/managed-by: kustomize


