# =============================================================================
# Local Network Overlay
# =============================================================================
# Self-contained deployment for the local K8s cluster.
# Includes: namespace, secrets, configmap, deployment, service, ingress, PVC.
#
# One command to deploy everything:
#   kubectl apply -k config/deploy/overlays/local
#
# One command to remove everything:
#   kubectl delete -k config/deploy/overlays/local

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: k8ops-local

namespace: k8ops-system

resources:
- ../../base

# ============================================================================
# Local Network Overrides
# ============================================================================

# Use local registry
images:
- name: ghcr.io/ggai/k8ops
  newName: registry.iot2.win/k8ops
  newTag: latest

# Override Ingress with local domain + TLS
patches:
- target:
    kind: Ingress
    name: k8ops-dashboard
  patch: |-
    - op: replace
      path: /spec/rules/0/host
      value: k8ops.iot2.win
    - op: replace
      path: /spec/tls/0/hosts/0
      value: k8ops.iot2.win
    - op: replace
      path: /spec/tls/0/secretName
      value: k8ops-dashboard-tls

# Override ConfigMap with local values
configMapGenerator:
- name: k8ops-config
  behavior: merge
  literals:
  - PROVIDER_TYPE=openai
  - PROVIDER_MODEL=gpt-4o
  - PROVIDER_ENDPOINT=https://api.openai.com/v1
  - cors-allowed-origins=https://k8ops.iot2.win
  - provider-rate-limit-rpm=0
  - debug=false

# Override Secrets with local values (overrides base placeholders)
secretGenerator:
- name: k8ops-auth
  behavior: replace
  literals:
  - jwt-secret=local-dev-jwt-secret-change-in-prod-8f4a2b9c
  options:
    disableNameSuffixHash: true
- name: k8ops-credentials
  behavior: replace
  literals:
  - api-key=dummy-key-for-local-testing
  options:
    disableNameSuffixHash: true
