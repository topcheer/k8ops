---
# k8ops custom ClusterRoles — vendor-independent, resource-level definitions
# These replace all references to K8s built-in roles (cluster-admin, edit, view, admin)
# Every role is explicitly defined at the apiGroups → resources → verbs level.

# ============================================================
# k8ops-role-admin: Full cluster access (replaces cluster-admin)
# ============================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8ops-role-admin
  labels:
    app.kubernetes.io/name: k8ops
    k8ops.io/role-template: "true"
rules:
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["*"]
---
# ============================================================
# k8ops-role-operator: Read/write most resources, no RBAC/secrets management
# (replaces edit)
# ============================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8ops-role-operator
  labels:
    app.kubernetes.io/name: k8ops
    k8ops.io/role-template: "true"
rules:
# Core resources — full CRUD
- apiGroups: [""]
  resources: ["pods", "pods/log", "pods/exec", "pods/portforward", "pods/attach",
              "services", "endpoints", "configmaps", "events",
              "persistentvolumeclaims", "replicationcontrollers",
              "serviceaccounts", "resourcequotas", "limitranges"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "deletecollection"]
# Namespaces — read only
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list", "watch"]
# Nodes — read only (infrastructure)
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "watch"]
# Apps
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "deletecollection"]
# Batch
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "deletecollection"]
# Networking
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses", "networkpolicies", "ingressclasses"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "deletecollection"]
- apiGroups: ["discovery.k8s.io"]
  resources: ["endpointslices"]
  verbs: ["get", "list", "watch"]
# Storage
- apiGroups: ["storage.k8s.io"]
  resources: ["storageclasses", "volumeattachments", "csinodes", "csidrivers", "csistoragecapacities"]
  verbs: ["get", "list", "watch"]
# Autoscaling
- apiGroups: ["autoscaling"]
  resources: ["horizontalpodautoscalers"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "deletecollection"]
# Policy
- apiGroups: ["policy"]
  resources: ["poddisruptionbudgets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "deletecollection"]
# CRDs — read only (operators can view but not manage CRD definitions)
- apiGroups: ["apiextensions.k8s.io"]
  resources: ["customresourcedefinitions"]
  verbs: ["get", "list", "watch"]
# Secrets — limited (operator can create/update own secrets but not list all)
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# PersistentVolumes — read only
- apiGroups: [""]
  resources: ["persistentvolumes"]
  verbs: ["get", "list", "watch"]
# All CRD-based resources — full CRUD (apps, operators, etc.)
- apiGroups: ["aiops.ggai.dev", "cert-manager.io", "traefik.io", "helm.cattle.io",
              "source.toolkit.fluxcd.io", "kustomize.toolkit.fluxcd.io",
              "monitoring.coreos.com", "argoproj.io"]
  resources: ["*"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "deletecollection"]
---
# ============================================================
# k8ops-role-viewer: Read-only cluster-wide (replaces view)
# Enhanced: includes nodes, secrets(get only), CRDs
# ============================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8ops-role-viewer
  labels:
    app.kubernetes.io/name: k8ops
    k8ops.io/role-template: "true"
rules:
# Core — read
- apiGroups: [""]
  resources: ["pods", "pods/log", "services", "endpoints", "configmaps",
              "events", "namespaces", "nodes", "persistentvolumes", "persistentvolumeclaims",
              "replicationcontrollers", "resourcequotas", "limitranges", "serviceaccounts"]
  verbs: ["get", "list", "watch"]
# Secrets — get only (sensitive)
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
# Apps — read
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
  verbs: ["get", "list", "watch"]
# Batch — read
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["get", "list", "watch"]
# Networking — read
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses", "networkpolicies", "ingressclasses"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["discovery.k8s.io"]
  resources: ["endpointslices"]
  verbs: ["get", "list", "watch"]
# Storage — read
- apiGroups: ["storage.k8s.io"]
  resources: ["storageclasses", "volumeattachments", "csinodes", "csidrivers"]
  verbs: ["get", "list", "watch"]
# Autoscaling — read
- apiGroups: ["autoscaling"]
  resources: ["horizontalpodautoscalers"]
  verbs: ["get", "list", "watch"]
# Policy — read
- apiGroups: ["policy"]
  resources: ["poddisruptionbudgets"]
  verbs: ["get", "list", "watch"]
# CRDs — read
- apiGroups: ["apiextensions.k8s.io"]
  resources: ["customresourcedefinitions"]
  verbs: ["get", "list", "watch"]
# RBAC — read (viewer can see roles/bindings)
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
  verbs: ["get", "list", "watch"]
# CRD-based resources — read
- apiGroups: ["aiops.ggai.dev", "cert-manager.io", "traefik.io", "helm.cattle.io",
              "source.toolkit.fluxcd.io", "kustomize.toolkit.fluxcd.io",
              "monitoring.coreos.com", "argoproj.io"]
  resources: ["*"]
  verbs: ["get", "list", "watch"]
---
# ============================================================
# k8ops-role-ns-admin: Namespace-scoped admin (replaces built-in admin)
# Bound via RoleBinding, only affects the target namespace
# ============================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8ops-role-ns-admin
  labels:
    app.kubernetes.io/name: k8ops
    k8ops.io/role-template: "true"
rules:
# Core namespaced resources — full CRUD
- apiGroups: [""]
  resources: ["pods", "pods/log", "pods/exec", "pods/portforward", "pods/attach",
              "services", "endpoints", "configmaps", "events",
              "persistentvolumeclaims", "replicationcontrollers",
              "resourcequotas", "limitranges"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "deletecollection"]
# ServiceAccounts — full CRUD within ns
- apiGroups: [""]
  resources: ["serviceaccounts"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# Secrets — full CRUD within ns
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# Apps — full CRUD
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "deletecollection"]
# Batch — full CRUD
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "deletecollection"]
# Networking — full CRUD
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses", "networkpolicies"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "deletecollection"]
# Autoscaling — full CRUD
- apiGroups: ["autoscaling"]
  resources: ["horizontalpodautoscalers"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "deletecollection"]
# Policy — full CRUD
- apiGroups: ["policy"]
  resources: ["poddisruptionbudgets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "deletecollection"]
# RBAC within ns — manage Roles and RoleBindings
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["roles", "rolebindings"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "deletecollection"]
# CRD-based resources — full CRUD within ns
- apiGroups: ["aiops.ggai.dev", "cert-manager.io", "traefik.io",
              "monitoring.coreos.com", "argoproj.io"]
  resources: ["*"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "deletecollection"]
---
