# Ingress for k8ops dashboard
# Customized via Kustomize overlay: change host, TLS issuer, etc.
# Pattern matches existing cluster: traefik ingressClass + cert-manager
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: k8ops-dashboard
  namespace: k8ops-system
  labels:
    app.kubernetes.io/name: k8ops
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    # Traefik: support WebSocket (terminal) and SSE streaming (chat/logs)
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  rules:
  - host: k8ops.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: k8ops-dashboard
            port:
              number: 9090
  tls:
  - hosts:
    - k8ops.example.com
    secretName: k8ops-dashboard-tls
