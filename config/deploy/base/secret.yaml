# Secret — JWT signing key placeholder.
# Actual values are injected via secretGenerator in kustomization.yaml
# (base layer generates a random JWT secret on each apply).
# For production, override with a fixed value in your overlay's secretGenerator.
apiVersion: v1
kind: Secret
metadata:
  name: k8ops-auth-placeholder
  namespace: k8ops-system
type: Opaque
stringData:
  jwt-secret: "placeholder"
