# secret.yaml — JWT signing secret
#
# IMPORTANT: Replace the placeholder value with a strong secret before applying.
# Generate one with:
#   openssl rand -base64 32
#
# Then:
#   kubectl apply -f config/deploy/base/secret.yaml -n k8ops-system
#
# Or create it directly (recommended, avoids storing plaintext in Git):
#   kubectl create secret generic k8ops-auth \
#     --from-literal=jwt-secret="$(openssl rand -base64 32)" \
#     -n k8ops-system
apiVersion: v1
kind: Secret
metadata:
  name: k8ops-auth
  namespace: k8ops-system
  labels:
    app.kubernetes.io/name: k8ops
type: Opaque
stringData:
  jwt-secret: "REPLACE_WITH_openssl_rand_base64_32"
