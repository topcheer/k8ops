apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8ops
  namespace: k8ops-system
  labels:
    app.kubernetes.io/name: k8ops
spec:
  replicas: 1
  revisionHistoryLimit: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: k8ops
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8ops
    spec:
      serviceAccountName: k8ops
      priorityClassName: system-cluster-critical
      terminationGracePeriodSeconds: 30
      containers:
      - name: k8ops
        image: ghcr.io/ggai/k8ops:latest
        imagePullPolicy: Always
        env:
        - name: AIOPS_API_KEY
          valueFrom:
            secretKeyRef:
              name: k8ops-credentials
              key: api-key
              optional: true
        - name: AUTH_JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: k8ops-auth
              key: jwt-secret
              optional: true
        # CORS: comma-separated list of allowed origins (required for cross-origin access)
        # Example: https://k8ops.example.com,https://k8ops.internal.net
        # When unset, the dashboard is same-origin only (secure default)
        - name: CORS_ALLOWED_ORIGINS
          valueFrom:
            configMapKeyRef:
              name: k8ops-config
              key: cors-allowed-origins
              optional: true
        # Slack notifications: incoming webhook URL for alerting
        - name: SLACK_WEBHOOK_URL
          valueFrom:
            secretKeyRef:
              name: k8ops-notifications
              key: slack-webhook-url
              optional: true
        # Dashboard TLS: leave empty to serve plain HTTP (Ingress handles TLS termination)
        - name: DASHBOARD_TLS_CERT
          value: ""
        - name: DASHBOARD_TLS_KEY
          value: ""
        # AI provider rate limiting (requests per minute, 0 = unlimited)
        - name: PROVIDER_RATE_LIMIT_RPM
          valueFrom:
            configMapKeyRef:
              name: k8ops-config
              key: provider-rate-limit-rpm
              optional: true
        # DEBUG: enable verbose logging ("true" / "false", default: false)
        - name: DEBUG
          valueFrom:
            configMapKeyRef:
              name: k8ops-config
              key: debug
              optional: true
        envFrom:
        - configMapRef:
            name: k8ops-config
            optional: true
        command:
        - /manager
        args:
        - --metrics-bind-address=:8080
        - --health-probe-bind-address=:8081
        - --dashboard-address=:9090
        ports:
        - containerPort: 8080
          name: metrics
          protocol: TCP
        - containerPort: 8081
          name: health
          protocol: TCP
        - containerPort: 9090
          name: dashboard
          protocol: TCP
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: "2"
            memory: 2Gi
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - name: data
          mountPath: /data
        - name: tls
          mountPath: /data/tls
          readOnly: true
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: k8ops-data
      - name: tls
        secret:
          secretName: k8ops-dashboard-tls
          optional: true
