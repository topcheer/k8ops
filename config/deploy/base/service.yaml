apiVersion: v1
kind: Service
metadata:
  name: k8ops-dashboard
  namespace: k8ops-system
  labels:
    app.kubernetes.io/name: k8ops
spec:
  selector:
    app.kubernetes.io/name: k8ops
  ports:
  - name: dashboard
    port: 9090
    targetPort: 9090
    protocol: TCP
  - name: metrics
    port: 8080
    targetPort: 8080
    protocol: TCP
  type: ClusterIP
