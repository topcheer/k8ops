apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: k8ops-alerts
  namespace: k8ops-system
  labels:
    app.kubernetes.io/name: k8ops
    release: prometheus
spec:
  groups:
  - name: k8ops-alerts
    rules:
    - alert: K8opsDown
      expr: up{job="k8ops"} == 0
      for: 2m
      labels:
        severity: critical
        team: ops
      annotations:
        summary: "k8ops service unavailable"
        description: "k8ops instance {{ $labels.instance }} has been offline for over 2 minutes."

    - alert: K8opsClusterHealthLow
      expr: k8ops_cluster_health_score < 60
      for: 5m
      labels:
        severity: warning
        team: ops
      annotations:
        summary: "Cluster health score low"
        description: "Current health score {{ $value }} (threshold 60), check node and pod status."

    - alert: K8opsClusterHealthCritical
      expr: k8ops_cluster_health_score < 30
      for: 2m
      labels:
        severity: critical
        team: ops
      annotations:
        summary: "Cluster health score critical"
        description: "Current health score {{ $value }} (threshold 30), cluster has severe issues!"

    - alert: K8opsLLMHighLatency
      expr: histogram_quantile(0.99, rate(k8ops_llm_call_duration_seconds_bucket[5m])) > 60
      for: 10m
      labels:
        severity: warning
        team: ops
      annotations:
        summary: "LLM call latency too high"
        description: "Provider {{ $labels.provider }} P99 latency {{ $value }}s exceeds 60s."

    - alert: K8opsSafetyBlocks
      expr: rate(k8ops_safety_blocks_total[5m]) > 0.1
      for: 5m
      labels:
        severity: warning
        team: security
      annotations:
        summary: "Safety blocks frequent"
        description: "Reason: {{ $labels.reason }}, possible abnormal operations."

    - alert: K8opsDiagnosticsBacklog
      expr: k8ops_active_diagnostics > 10
      for: 10m
      labels:
        severity: warning
        team: ops
      annotations:
        summary: "Diagnostics backlog"
        description: "{{ $value }} active diagnostics running, may impact system responsiveness."
