version: "2"

linters:
  default: none
  enable:
    - govet

settings:
  errcheck:
    exclude-functions:
      - (io.Closer).Close
      - (net/http.ResponseWriter).Write
      - (*encoding/json.Decoder).Decode

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - govet
  max-issues-per-linter: 0
  max-same-issues: 0

run:
  timeout: 5m
