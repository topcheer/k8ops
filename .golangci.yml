linters:
  disable-all: true
  enable:
    - govet
    - errcheck

linters-settings:
  errcheck:
    exclude-functions:
      - (io.Closer).Close
      - (net/http.ResponseWriter).Write
      - (*encoding/json.Decoder).Decode

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - govet
  max-issues-per-linter: 0
  max-same-issues: 0

run:
  timeout: 5m

