version: "3.8"

# Test environment for LDAP + OIDC (Keycloak) development.
# Usage:
#   docker compose -f docker-compose.test-auth.yml up -d
#   # LDAP:           ldap://localhost:389
#   # Keycloak admin: http://localhost:8080 (admin/admin)
#   # PostgreSQL:     localhost:5432 (keycloak/keycloak)
#
# LDAP test users:
#   viewer1/viewer123, operator1/operator123, ldapadmin/admin123
# k8ops LDAP config:
#   Server: ldap://localhost:389
#   Bind DN: cn=admin,dc=k8ops,dc=test
#   Bind PW: admin
#   Search Base: dc=k8ops,dc=test
#   Search Filter: (uid={username})

services:
  openldap:
    image: osixia/openldap:1.5.0
    container_name: test-openldap
    hostname: openldap
    ports:
      - "389:389"
      - "636:636"
    environment:
      LDAP_ORGANISATION: "k8ops Test"
      LDAP_DOMAIN: "k8ops.test"
      LDAP_ADMIN_PASSWORD: "admin"
      LDAP_BASE_DN: "dc=k8ops,dc=test"
    volumes:
      - openldap_data:/var/lib/ldap
      - openldap_config:/etc/ldap/slapd.d

  openldap-seed:
    image: osixia/openldap:1.5.0
    container_name: test-openldap-seed
    depends_on: [openldap]
    volumes:
      - ./test/ldap-seed.sh:/seed.sh
    entrypoint: ["/bin/bash", "/seed.sh"]
    restart: "no"

  postgres:
    image: postgres:16-alpine
    container_name: test-postgres
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 3s
      timeout: 3s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: test-keycloak
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME: localhost
      KC_HTTP_ENABLED: "true"
    command: start-dev

volumes:
  openldap_data:
  openldap_config:
  pg_data:
