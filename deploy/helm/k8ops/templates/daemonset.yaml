{{- if eq .Values.mode "daemonset" }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: k8ops
  namespace: {{ .Values.namespace.name }}
  labels:
    app.kubernetes.io/name: k8ops
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: k8ops
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8ops
    spec:
      serviceAccountName: k8ops
      terminationGracePeriodSeconds: 30
      tolerations:
        {{- toYaml .Values.daemonset.tolerations | nindent 6 }}
      hostPID: {{ .Values.daemonset.hostPID }}
      hostNetwork: {{ .Values.daemonset.hostNetwork }}
      containers:
      - name: k8ops
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        lifecycle:
          preStop:
            exec:
              command: ["/manager", "--pre-stop"]
        env:
          {{- include "k8ops.env" . | nindent 8 }}
        envFrom:
        - configMapRef:
            name: k8ops-config
            optional: true
        command:
        - /manager
        args:
        - --metrics-bind-address={{ .Values.controller.metricsAddress }}
        - --health-probe-bind-address={{ .Values.controller.healthProbeAddress }}
        - --dashboard-address={{ .Values.dashboard.address }}
        ports:
        - name: dashboard
          containerPort: 9090
          protocol: TCP
        - name: metrics
          containerPort: 8080
          protocol: TCP
        - name: health
          containerPort: 8081
          protocol: TCP
        resources:
          {{- toYaml .Values.resources.daemonset | nindent 10 }}
        securityContext:
          privileged: {{ .Values.daemonset.privileged }}
          readOnlyRootFilesystem: false
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: health
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - name: host-root
          mountPath: /host
          readOnly: true
        - name: var-run
          mountPath: /var/run
        - name: audit-log
          mountPath: /var/log/k8ops
        - name: data
          mountPath: /data
      volumes:
      - name: host-root
        hostPath:
          path: /
          type: Directory
      - name: var-run
        hostPath:
          path: /var/run
      - name: audit-log
        hostPath:
          path: /var/log/k8ops
          type: DirectoryOrCreate
      - name: data
        hostPath:
          path: /var/lib/k8ops
          type: DirectoryOrCreate
{{- end }}
