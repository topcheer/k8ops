apiVersion: v1
kind: Secret
metadata:
  name: k8ops-auth
  namespace: {{ .Values.namespace.name }}
  labels:
    app.kubernetes.io/name: k8ops
type: Opaque
stringData:
  jwt-secret: {{ if .Values.auth.jwtSecret }}{{ .Values.auth.jwtSecret | quote }}{{ else }}{{ randAlphaNum 32 | quote }}{{ end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: k8ops-credentials
  namespace: {{ .Values.namespace.name }}
  labels:
    app.kubernetes.io/name: k8ops
type: Opaque
{{- if .Values.provider.apiKey }}
stringData:
  api-key: {{ .Values.provider.apiKey | quote }}
{{- end }}
{{- if .Values.notifications.slackWebhookUrl }}
---
apiVersion: v1
kind: Secret
metadata:
  name: k8ops-notifications
  namespace: {{ .Values.namespace.name }}
  labels:
    app.kubernetes.io/name: k8ops
type: Opaque
stringData:
  slack-webhook-url: {{ .Values.notifications.slackWebhookUrl | quote }}
{{- end }}
