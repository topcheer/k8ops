<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>k8ops — Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117; color: #c9d1d9;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    .login-card {
      background: #161b22; border: 1px solid #30363d; border-radius: 12px;
      padding: 40px; width: 380px; max-width: 90vw;
      box-shadow: 0 16px 48px rgba(0,0,0,0.4);
    }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo h1 { font-size: 28px; color: #58a6ff; font-weight: 700; }
    .logo p { color: #8b949e; font-size: 14px; margin-top: 4px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; color: #8b949e; margin-bottom: 6px; font-weight: 500; }
    input[type="text"], input[type="password"] {
      width: 100%; background: #0d1117; border: 1px solid #30363d;
      color: #c9d1d9; padding: 10px 14px; border-radius: 6px;
      font-size: 14px; outline: none; transition: border-color 0.2s;
    }
    input:focus { border-color: #58a6ff; box-shadow: 0 0 0 3px rgba(88,166,255,0.12); }
    .btn-login {
      width: 100%; background: #238636; border: none; color: #fff;
      padding: 10px; border-radius: 6px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background 0.2s; margin-top: 4px;
    }
    .btn-login:hover { background: #2ea043; }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
    .divider {
      display: flex; align-items: center; margin: 20px 0;
      color: #484f58; font-size: 12px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: #30363d;
    }
    .divider span { padding: 0 12px; }
    .btn-oidc {
      width: 100%; background: #21262d; border: 1px solid #30363d;
      color: #c9d1d9; padding: 10px; border-radius: 6px;
      font-size: 14px; cursor: pointer; transition: background 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-oidc:hover { background: #30363d; }
    .alert {
      background: #3d1f1f; border: 1px solid #f8514933; color: #f85149;
      padding: 10px 14px; border-radius: 6px; font-size: 13px;
      margin-bottom: 16px; display: none;
    }
    .alert.show { display: block; }
    .hint {
      margin-top: 16px; padding: 10px 14px; background: #1c2128;
      border-radius: 6px; font-size: 12px; color: #8b949e; text-align: center;
    }
    .hint code { color: #d2a8ff; background: #0d1117; padding: 2px 6px; border-radius: 3px; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <h1>k8ops</h1>
      <p>Kubernetes AIOps Dashboard</p>
    </div>

    <div id="alertBox" class="alert"></div>

    <form id="loginForm" onsubmit="return doLogin(event)">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" autocomplete="username" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-login" id="loginBtn">Sign In</button>
    </form>

    <div id="oidcSection" style="display:none;">
      <div class="divider"><span>or sign in with</span></div>
      <div id="oidcButtons" style="display:flex;flex-direction:column;gap:8px;"></div>
    </div>

    <div class="hint" id="defaultHint">
      Default: <code>admin</code> / <code>admin</code> (change after login)
    </div>
  </div>

  <script>
    // Provider icons for login page
    function loginProviderIcon(name, size) {
      size = size || 20;
      const icons = {
        github: '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="#f0f6fc"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>',
        google: '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>',
        microsoft: '<svg width="'+size+'" height="'+size+'" viewBox="0 0 23 23"><path fill="#f25022" d="M1 1h10v10H1z"/><path fill="#7fba00" d="M12 1h10v10H12z"/><path fill="#00a4ef" d="M1 12h10v10H1z"/><path fill="#ffb900" d="M12 12h10v10H12z"/></svg>',
        gitlab: '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="#fc6d26"><path d="M23.955 13.587l-1.347-4.135-2.664-8.197a.455.455 0 00-.867 0L16.416 9.45H7.584L4.923 1.255a.455.455 0 00-.867 0L1.392 9.452.045 13.587a.924.924 0 00.331 1.023L12 23.054l11.624-8.443a.92.92 0 00.331-1.024"/></svg>',
        keycloak: '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24"><rect width="24" height="24" rx="4" fill="#4d4d4d"/><text x="12" y="17" text-anchor="middle" fill="#fff" font-size="14" font-family="sans-serif" font-weight="bold">KC</text></svg>',
        okta: '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="#007dc1" stroke-width="4"/></svg>',
        auth0: '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="#eb5424"><path d="M21.98 7.448L19.62 0H4.347L2.02 7.448c-1.352 4.312.03 8.87 3.344 11.697L12.005 24l6.635-4.855c3.31-2.828 4.69-7.385 3.34-11.697M12 18.07l-3.766-2.752 3.766-2.752 3.766 2.752z"/></svg>',
      };
      if (icons[name]) return icons[name];
      if (name && name.length <= 2) return '<span style="font-size:'+size+'px;">'+name+'</span>';
      return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>';
    }

    async function checkAuthStatus() {
      try {
        const res = await fetch('/api/auth/status');
        const data = await res.json();
        if (data.oidc_enabled) {
          document.getElementById('oidcSection').style.display = 'block';
          const providers = data.oidc_providers || [];
          const btnsDiv = document.getElementById('oidcButtons');
          btnsDiv.innerHTML = providers.map(p => {
            const oidcUrl = p.name === 'legacy' ? '/api/auth/oidc' : '/api/auth/oidc/' + p.name + '/login';
            return '<button class="btn-oidc" onclick="window.location.href=\''+oidcUrl+'\'" style="display:flex;align-items:center;justify-content:center;gap:10px;">'+
              loginProviderIcon(p.icon, 20) +
              '<span>Login with '+p.display_name+'</span>'+
              '</button>';
          }).join('');
        }
        if (!data.ldap_enabled && !data.oidc_enabled && data.user_count > 0) {
          document.getElementById('defaultHint').style.display = 'none';
        }
      } catch(e) {}
    }
    checkAuthStatus();

    function showAlert(msg) {
      const box = document.getElementById('alertBox');
      box.textContent = msg;
      box.classList.add('show');
    }

    async function doLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
          }),
        });
        const data = await res.json();

        if (res.ok) {
          if (data.must_change) {
            window.location.href = '/#change-password';
          } else {
            window.location.href = '/';
          }
        } else {
          showAlert(data.error || 'Login failed');
          btn.disabled = false;
          btn.textContent = 'Sign In';
        }
      } catch(err) {
        showAlert('Network error: ' + err.message);
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
      return false;
    }
  </script>
</body>
</html>
