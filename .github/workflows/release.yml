name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  gate:
    name: Pre-release Gate (format + vet + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          UNFORMATTED=$(gofmt -l . | grep -v vendor/ || true)
          if [ -n "$UNFORMATTED" ]; then
            echo "::error::Files need formatting:"
            echo "$UNFORMATTED"
            exit 1
          fi

      - name: Go vet
        run: go vet ./...

      - name: Go build
        run: go build ./...

      - name: Run tests
        run: go test -timeout 5m ./...

  release:
    name: Release (GoReleaser + SBOM)
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Uncomment when DOCKERHUB_TOKEN secret is configured
      # - name: Login to Docker Hub
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKERHUB_USERNAME }}
      #     password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            NOTES=$(git log --pretty=format:"- %s" HEAD~20..HEAD)
          else
            NOTES=$(git log --pretty=format:"- %s" "${PREV_TAG}..HEAD")
          fi
          # Write to file for multiline output
          echo "$NOTES" > release-notes.txt
          echo "## What's Changed" > release-body.md
          echo "" >> release-body.md
          cat release-notes.txt >> release-body.md
          echo "" >> release-body.md
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${{ github.ref_name }}" >> release-body.md

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean --release-notes=release-body.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --- SBOM Generation (Software Bill of Materials) ---
      - name: Install syft
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          artifact-name: k8ops-sbom.spdx.json

      - name: Upload SBOM to release
        uses: softprops/action-gh-release@v2
        with:
          files: k8ops-sbom.spdx.json

  verify:
    name: Post-release Verification
    needs: release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Download checksums
        uses: actions/download-artifact@v4
        with:
          name: checksums
        continue-on-error: true

      - name: Verify release assets exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Verifying release $TAG..."

          # Check release exists and has assets
          ASSET_COUNT=$(gh release view "$TAG" --json assets --jq '.assets | length')
          echo "Asset count: $ASSET_COUNT"

          if [ "$ASSET_COUNT" -lt 15 ]; then
            echo "::error::Expected at least 15 assets, got $ASSET_COUNT"
            exit 1
          fi

          # Check it's not a draft
          IS_DRAFT=$(gh release view "$TAG" --json isDraft --jq '.isDraft')
          if [ "$IS_DRAFT" = "true" ]; then
            echo "::error::Release is still a draft"
            exit 1
          fi

          # Verify GHCR image exists
          echo "Checking GHCR image..."
          gh api -H "Accept: application/vnd.github.v3+json" \
            "/users/topcheer/packages/container/k8ops/versions" \
            --jq ".[0].metadata.container.tags[0]" || echo "GHCR check skipped"

          echo "Release $TAG verified successfully."
