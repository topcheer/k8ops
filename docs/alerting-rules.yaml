# Prometheus rule file for k8ops (standalone, non-Operator)
# Use with: prometheus --rules-file=docs/alerting-rules.yaml
# For Prometheus Operator, use config/alerting-rules.yaml instead.

groups:
- name: k8ops-alerts
  rules:
  - alert: K8opsDown
    expr: up{job="k8ops"} == 0
    for: 2m
    labels:
      severity: critical
      team: ops
    annotations:
      summary: "k8ops service unavailable"
      description: "k8ops instance {{ $labels.instance }} has been offline for over 2 minutes."

  - alert: K8opsPodCrashLooping
    expr: rate(kube_pod_container_status_restarts_total{namespace="k8ops-system"}[15m]) > 0
    for: 5m
    labels:
      severity: critical
      team: ops
    annotations:
      summary: "k8ops Pod crash-looping"
      description: "Pod in k8ops-system namespace restarting continuously for 15 minutes."

  - alert: K8opsClusterHealthLow
    expr: k8ops_cluster_health_score < 60
    for: 5m
    labels:
      severity: warning
      team: ops
    annotations:
      summary: "Cluster health score low"
      description: "Current health score {{ $value }} (threshold 60)."

  - alert: K8opsClusterHealthCritical
    expr: k8ops_cluster_health_score < 30
    for: 2m
    labels:
      severity: critical
      team: ops
    annotations:
      summary: "Cluster health score critical"
      description: "Current health score {{ $value }} (threshold 30)."

  - alert: K8opsLLMHighLatency
    expr: histogram_quantile(0.99, rate(k8ops_llm_call_duration_seconds_bucket[5m])) > 60
    for: 10m
    labels:
      severity: warning
      team: ops
    annotations:
      summary: "LLM call latency too high"
      description: "Provider {{ $labels.provider }} P99 latency {{ $value }}s exceeds 60s."

  - alert: K8opsLLMCallFailures
    expr: rate(k8ops_llm_call_duration_seconds_count{status!="success"}[5m]) > 0.5
    for: 5m
    labels:
      severity: warning
      team: ops
    annotations:
      summary: "LLM call failure rate too high"
      description: "Provider {{ $labels.provider }} failure rate exceeds 0.5/s."

  - alert: K8opsTokenUsageSpike
    expr: rate(k8ops_llm_tokens_total[1h]) > 100000
    for: 15m
    labels:
      severity: warning
      team: ops
    annotations:
      summary: "Token usage spike"
      description: "Token consumption rate {{ $value }}/s."

  - alert: K8opsSafetyBlocks
    expr: rate(k8ops_safety_blocks_total[5m]) > 0.1
    for: 5m
    labels:
      severity: warning
      team: security
    annotations:
      summary: "Safety blocks frequent"
      description: "Reason: {{ $labels.reason }}."

  - alert: K8opsDiagnosticsBacklog
    expr: k8ops_active_diagnostics > 10
    for: 10m
    labels:
      severity: warning
      team: ops
    annotations:
      summary: "Diagnostics backlog"
      description: "{{ $value }} active diagnostics running."

  - alert: K8opsToolCallSlow
    expr: histogram_quantile(0.95, rate(k8ops_tool_call_duration_seconds_bucket[5m])) > 10
    for: 10m
    labels:
      severity: warning
      team: ops
    annotations:
      summary: "Tool call response slow"
      description: "Tool {{ $labels.tool }} P95 response time {{ $value }}s exceeds 10s."
