version: 2

project_name: k8ops

before:
  hooks:
    - go mod tidy

builds:
  - id: manager
    main: ./cmd/manager
    binary: manager
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
      - freebsd
    goarch:
      - amd64
      - arm64
      - 386
      - arm
      - ppc64le
      - s390x
    goarm:
      - "7"
    ignore:
      - goos: windows
        goarch: arm
      - goos: windows
        goarch: ppc64le
      - goos: windows
        goarch: s390x
      - goos: windows
        goarch: 386
      - goos: darwin
        goarch: 386
      - goos: darwin
        goarch: ppc64le
      - goos: darwin
        goarch: s390x
      - goos: freebsd
        goarch: ppc64le
      - goos: freebsd
        goarch: s390x
    ldflags:
      - -s -w
      - -X github.com/ggai/k8ops/internal/dashboard.Version={{.Version}}
      - -X github.com/ggai/k8ops/internal/dashboard.GitCommit={{.ShortCommit}}
      - -X github.com/ggai/k8ops/internal/dashboard.BuildDate={{.Date}}

  - id: k8ops-cli
    main: ./cmd/k8ops
    binary: k8ops
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
      - freebsd
    goarch:
      - amd64
      - arm64
      - 386
      - arm
      - ppc64le
      - s390x
    goarm:
      - "7"
    ignore:
      - goos: windows
        goarch: arm
      - goos: windows
        goarch: ppc64le
      - goos: windows
        goarch: s390x
      - goos: windows
        goarch: 386
      - goos: darwin
        goarch: 386
      - goos: darwin
        goarch: ppc64le
      - goos: darwin
        goarch: s390x
      - goos: freebsd
        goarch: ppc64le
      - goos: freebsd
        goarch: s390x
    ldflags:
      - -s -w
      - -X github.com/ggai/k8ops/internal/dashboard.Version={{.Version}}

archives:
  - id: default
    builds:
      - manager
      - k8ops-cli
    name_template: >-
      {{ .ProjectName }}_
      {{ .Version }}_
      {{ .Os }}_
      {{ .Arch }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE
      - config/deploy/**/*
      - config/daemonset-local.yaml
      - install.sh
      - docs/*.md

checksum:
  name_template: "checksums.txt"

changelog:
  disable: true

release:
  github:
    owner: topcheer
    name: k8ops
  draft: false
  prerelease: auto
  name_template: "{{ .Tag }}"
  header: |
    ## k8ops {{ .Version }}

    ### Installation

    ```bash
    # Download the archive for your platform from the assets below
    # Or use the CLI installer:
    curl -sSL https://github.com/topcheer/k8ops/releases/download/{{ .Version }}/install.sh | bash
    ```

    ### Supported Platforms

    | OS | Architecture |
    |----|-------------|
    | Linux | amd64, arm64, 386, armv7, ppc64le, s390x |
    | macOS | amd64 (Intel), arm64 (Apple Silicon) |
    | Windows | amd64, arm64 |
    | FreeBSD | amd64, arm64, 386, armv7 |
